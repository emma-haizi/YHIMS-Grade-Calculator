<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHIMS Grade Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 40px 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 700px; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); font-size: 18px; }
        .title-area { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 32px; color: #1e293b; letter-spacing: -0.5px; }
        .author { font-size: 14px; color: #64748b; margin-top: 8px; font-weight: 500; }
        .select-row { display: flex; gap: 15px; }
        @media (max-width: 480px) { .select-row { flex-direction: column; gap: 0; } }
        select, input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; font-size: 18px; box-sizing: border-box; transition: all 0.2s ease; }
        select, input { border: 1px solid #cbd5e1; background: #fff; color: #334155; }
        button { background: #b9d9eb; color: #0f2d4a; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #a2cce4; transform: translateY(-1px); }
        .info-box { background: #f1f5f9; color: #334155; padding: 18px; font-weight: bold; border-radius: 10px; margin: 20px 0; text-align: center; font-size: 19px; border: 1px solid #e2e8f0; }
        .section { border-top: 1px solid #e2e8f0; padding: 25px 0; margin-top: 25px; }
        h2 { font-size: 22px; color: #334155; margin-top: 0; }
        .res { margin-top: 15px; padding: 18px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; min-height: 30px; line-height: 1.6; font-weight: 500; transition: all 0.3s; }
        .error-msg { background: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; text-align: center; }
        .blue-highlight { background: linear-gradient(135deg, #1e3a8a, #0369a1); color: #ffffff; border: none; font-weight: bold; text-align: center; }
        .gold { background: linear-gradient(45deg, #ffd700, #ffa500); color: white; text-align: center; font-weight: bold; animation: pulse 1.5s infinite; border: none; }
        .green-vip { background: linear-gradient(45deg, #2ecc71, #1abc9c); color: white; font-weight: bold; text-align: center; animation: glow 2s infinite alternate; border: none; }
        .red-alert { background: linear-gradient(45deg, #e74c3c, #c0392b); color: white; font-weight: bold; text-align: center; animation: shake 0.5s ease-in-out 1; border: none; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(46, 204, 113, 0.4); } 100% { box-shadow: 0 0 20px rgba(26, 188, 156, 0.8); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-4px); } 40%, 80% { transform: translateX(4px); } }
    </style>
</head>
<body>
<div class="box">
    <div class="title-area">
        <h1>YHIMS Grade Calculator</h1>
        <div class="author">제작 : YHIMS 16기 김아윤</div>
    </div>
    <div class="select-row">
        <select id="sem" onchange="up()"><option value="1">1학기</option><option value="2">2학기</option></select>
        <select id="sub" onchange="up()">
            <option value="국어">국어</option><option value="수학">수학</option><option value="사회역사">사회/역사</option>
            <option value="과학">과학</option><option value="영어">영어</option><option value="제2외국어">제 2외국어</option><option value="기술가정">기술가정</option>
        </select>
    </div>
    <div id="ratio" class="info-box"></div>
    <div class="section">
        <h2>1. A등급 달성 커트라인 계산</h2>
        <label id="lbl1">중간고사 점수 :</label><input type="number" id="sc1" min="0" max="100" placeholder="점수를 입력하세요">
        <button onclick="cal1()">필요한 최소 점수 계산</button>
        <div id="res1" class="res">결과가 여기에 표시됩니다.</div>
    </div>
    <div class="section">
        <h2>2. 최종 성적 계산기</h2>
        <label id="lbl2">중간고사 점수 :</label><input type="number" id="sc2" min="0" max="100">
        <label id="lbl3">수행평가 점수 :</label><input type="number" id="sc3" min="0" max="100">
        <button onclick="cal2()">최종 원점수 확인</button>
        <div id="res2" class="res">결과가 여기에 표시됩니다.</div>
    </div>
</div>
<script>
    const aMsg = {
        100: "최상위권 성적으로 A등급 기준을 만족했습니다.",
        99: "최상위권 성적으로 A등급 기준을 만족했습니다.",
        98: "최상위권 성적으로 A등급 기준을 만족했습니다.",
        97: "최상위권 성적으로 A등급 기준을 만족했습니다.",
        96: "우수한 성적으로 A등급 기준을 충족했습니다.",
        95: "우수한 성적으로 A등급 기준을 충족했습니다.",
        94: "우수한 성적으로 A등급 기준을 충족했습니다.",
        93: "우수한 성적으로 A등급 기준을 충족했습니다.",
        92: "성적 기준을 충족하여 A등급을 획득했습니다.",
        91: "성적 기준을 충족하여 A등급을 획득했습니다.",
        90: "성적 기준을 충족하여 A등급을 획득했습니다."
    };
    function getConf() {
        const s = document.getElementById("sem").value, k = document.getElementById("sub").value;
        let t = "중간", e = 30, p = 70;
        if (k === "과학") { e = 20; p = 80; }
        if (s === "2" || ["사회역사", "영어", "제2외국어", "기술가정"].includes(k)) { t = "기말"; }
        return { t: t, e: e, p: p, n: document.getElementById("sub").options[document.getElementById("sub").selectedIndex].text };
    }
    function up() {
        const c = getConf();
        document.getElementById("ratio").innerText = `[${document.getElementById("sem").value}학기] ${c.n} 과목은 [${c.t}고사 ${c.e}%, 수행평가 ${c.p}%]로 산출됨`;
        if (c.t === "중간") {
            document.getElementById("lbl1").innerText = "중간고사 점수 :";
            document.getElementById("sc1").placeholder = "중간고사 점수를 입력하세요";
            document.getElementById("lbl2").innerText = "중간고사 점수 :";
        } else {
            document.getElementById("lbl1").innerText = "수행평가 점수 :";
            document.getElementById("sc1").placeholder = "수행평가 점수를 입력하세요";
            document.getElementById("lbl2").innerText = "기말고사 점수 :";
        }
        document.getElementById("lbl3").innerText = "수행평가 점수 :";
        document.getElementById("res1").className = "res"; document.getElementById("res1").innerText = "결과가 여기에 표시됩니다.";
        document.getElementById("res2").className = "res"; document.getElementById("res2").innerText = "결과가 여기에 표시됩니다.";
        document.getElementById("sc1").value = ""; document.getElementById("sc2").value = ""; document.getElementById("sc3").value = "";
    }
    function cal1() {
        const c = getConf(), v = parseFloat(document.getElementById("sc1").value), r = document.getElementById("res1");
        if(isNaN(v) || v<0 || v>100) { r.className = "res error-msg"; r.innerText = "⚠️ 0~100 사이의 정확한 점수를 입력해 주세요."; return; }
        r.className = "res blue-highlight";
        let need = c.t === "중간" ? (89.5 - (v * (c.e / 100))) / (c.p / 100) : (89.5 - (v * (c.p / 100))) / (c.e / 100);
        let target = c.t === "중간" ? "수행평가" : "기말고사";
        if (need <= 0) r.innerHTML = `이미 A등급 커트라인을 달성했습니다! (남은 시험 0점 기준)`;
        else if (need > 100) r.innerHTML = `이 점수로는 다음 시험에서 100점을 획득하여도 A등급 달성이 불가능합니다.`;
        else r.innerHTML = `🎯 A등급을 받기 위해 필요한 최소 ${target} 점수는 ${need.toFixed(1)}점입니다.`;
    }
    function cal2() {
        const c = getConf(), e = parseFloat(document.getElementById("sc2").value), p = parseFloat(document.getElementById("sc3").value), r = document.getElementById("res2");
        if(isNaN(e) || isNaN(p) || e<0 || e>100 || p<0 || p>100) { r.className = "res error-msg"; r.innerText = "⚠️ 중간(기말)고사 및 수행평가 점수를 모두 정확하게 입력해 주세요."; return; }
        const raw = (e * (c.e/100)) + (p * (c.p/100)), rnd = Math.round(raw);
        let g = 'F'; r.className = "res";
        if(raw>=89.5) g='A'; else if(raw>=79.5) g='B'; else if(raw>=69.5) g='C'; else if(raw>=59.5) g='D'; else if(raw>=49.5) g='E';
        let txt = `원점수: <strong>${rnd}점</strong> (${raw.toFixed(1)}점) / 등급: <strong>${g}등급</strong><br>`;
        if (rnd === 100) { r.className = "res gold"; txt = `👑 100점 만점으로 A등급 기준을 만족했습니다! 👑<br>원점수: ${rnd}점 (${raw.toFixed(1)}점) / 등급: ${g}`; }
        else if (g === 'A') { r.className = "res green-vip"; txt = `원점수: ${rnd}점 (${raw.toFixed(1)}점) / 등급: ${g}등급<br>🎉 ${aMsg[rnd]} 🎉`; }
        else { r.className = "res red-alert"; txt += g === 'B' ? "조금만 더 노력하면 A등급도 노려볼 수 있어요! 파이팅!" : "이번 학기 고생 많으셨습니다! 다음 학기에도 좋은 결과가 있기를 응원합니다."; }
        r.innerHTML = txt;
    }
    document.getElementById("sc1").addEventListener("keydown", function(e) { if(e.key === "Enter") cal1(); });
    document.getElementById("sc2").addEventListener("keydown", function(e) { if(e.key === "Enter") cal2(); });
    document.getElementById("sc3").addEventListener("keydown", function(e) { if(e.key === "Enter") cal2(); });
    up();
</script>
</body>
</html>
